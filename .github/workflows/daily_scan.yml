name: BioGems Daily Search

on:
  schedule:
    # 한국 시간 오전 6시 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행 버튼

# 여기에 환경 변수를 추가하여 Node.js 24 강제 적용
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Alert Script
      env:
        GMAIL_PASSWORD: ${{ secrets.MY_PASSWORD }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}  # ✅ 추가
      run: python pmc_bot.py
      
    - name: Run Google Scholar Bot
      env:
        GMAIL_PASSWORD: ${{ secrets.MY_PASSWORD }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      run: python googlescholar_bot.py
    
    - name: Commit and push history file
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add sent_list.txt sent_list_pubmed.txt sent_list_scholar.txt  # ✅ 모든 이력 파일 추가
        git diff --quiet && git diff --staged --quiet || git commit -m "Update history files [skip ci]"
        git push
